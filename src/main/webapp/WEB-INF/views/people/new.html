<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New person</title>
</head>
<body>

<form th:method="POST" th:action="@{/people}" th:object="${person}">
    <label for="surname">Enter surname: </label>
    <input type="text" th:field="*{surname}" id="surname"/>
    <div style="color:red" th:if="${#fields.hasErrors('surname')}" th:errors="*{surname}"> Surname error</div>
    <br/>

    <label for="name">Enter name: </label>
    <input type="text" th:field="*{name}" id="name"/>
    <div style="color:red" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"> Name error</div>
    <br/>

    <label for="patonymic">Enter patonymic: </label>
    <input type="text" th:field="*{patonymic}" id="patonymic"/>
    <div style="color:red" th:if="${#fields.hasErrors('patonymic')}" th:errors="*{patonymic}"> Patonymic error</div>
    <br/>

    <label for="birthYear">Enter birthYear: </label>
    <input type="text" th:field="*{birthYear}" id="birthYear"/>
    <div style="color:red" th:if="${#fields.hasErrors('birthYear')}" th:errors="*{birthYear}"> BirthYear error</div>
    <br/>

    <input type="submit" value="Create!"/>


</form>

</body>
</html>
